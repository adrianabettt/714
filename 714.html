<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Missão Grafos — 7º Ano</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --p: #1a1a2e;
    --s: #4361ee;
    --v: #2ecc71;
    --err: #e74c3c;
    --gold: #f39c12;
    --bg: #f4f6fb;
    --card: #ffffff;
    --border: #e0e4ef;
    --text: #1a1a2e;
    --muted: #6b7280;
    --radius: 14px;
  }

  body {
    font-family: 'Nunito', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    background: var(--p);
    color: white;
    text-align: center;
    padding: 18px 20px 14px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.18);
  }
  header h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }
  header p {
    font-size: 13px;
    opacity: 0.75;
    margin-top: 3px;
  }

  /* ── MAIN ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 40px;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    width: 100%;
    max-width: 680px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 22px;
  }
  .progress-bar {
    flex: 1;
    height: 9px;
    background: #dde3f0;
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--s);
    border-radius: 99px;
    transition: width 0.55s ease;
  }
  .progress-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    min-width: 52px;
    text-align: right;
    font-family: 'Space Mono', monospace;
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 28px 24px;
    width: 100%;
    max-width: 680px;
    box-shadow: 0 4px 18px rgba(67,97,238,0.07);
  }

  .phase-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 4px 11px;
    border-radius: 99px;
    background: #eef1fb;
    color: var(--s);
    margin-bottom: 12px;
  }

  .question {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 18px;
  }

  /* ── VISUAL ── */
  .visual {
    background: #f8faff;
    border: 1px solid #dde3f0;
    border-radius: 10px;
    padding: 14px 10px;
    margin-bottom: 18px;
    overflow: hidden;
  }
  .visual svg { display: block; }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 9px; margin-bottom: 14px; }

  .opt {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: white;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 600;
    text-align: left;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    width: 100%;
  }
  .opt:hover:not(:disabled) {
    background: #f0f4ff;
    border-color: var(--s);
  }
  .opt:active:not(:disabled) { transform: scale(0.99); }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #eafaf1; border-color: #2ecc71; color: #1a7a45; }
  .opt.wrong   { background: #fdf0ef; border-color: var(--err); color: #a82222; }

  .opt-letter {
    width: 27px; height: 27px;
    border-radius: 7px;
    background: #eef1fb;
    color: var(--s);
    font-size: 12px;
    font-weight: 800;
    font-family: 'Space Mono', monospace;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }
  .opt.correct .opt-letter { background: #2ecc71; color: white; }
  .opt.wrong   .opt-letter { background: var(--err); color: white; }

  /* ── FEEDBACK ── */
  .feedback {
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.65;
    display: none;
    margin-bottom: 14px;
  }
  .feedback.show { display: block; }
  .feedback.ok   { background: #eafaf1; border: 1px solid #a3dfc1; color: #1a7a45; }
  .feedback.bad  { background: #fdf0ef; border: 1px solid #f4b8b2; color: #a82222; }
  .fb-title { font-size: 15px; font-weight: 800; margin-bottom: 5px; }

  .concept-box {
    background: #f4f6fb;
    border-left: 3px solid var(--s);
    padding: 10px 14px;
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    color: #374151;
    margin-top: 10px;
    line-height: 1.65;
  }
  .concept-box strong { color: var(--p); }

  /* ── NEXT BUTTON ── */
  .next-btn {
    width: 100%;
    padding: 14px;
    background: var(--s);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    display: none;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.2px;
  }
  .next-btn.show { display: block; }
  .next-btn:hover { opacity: 0.88; }
  .next-btn:active { transform: scale(0.99); }

  /* ── END SCREEN ── */
  .end-card { text-align: center; padding: 2.5rem 1.5rem; }
  .end-icon { font-size: 44px; font-family: 'Space Mono', monospace; color: var(--gold); display: block; margin-bottom: 14px; }
  .end-title { font-size: 24px; font-weight: 800; color: var(--p); margin-bottom: 8px; }
  .end-text { font-size: 14px; color: var(--muted); line-height: 1.75; margin-bottom: 22px; }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 22px; }
  .stat { background: #f4f6fb; border-radius: 10px; padding: 14px; text-align: center; }
  .stat-val { font-size: 30px; font-weight: 800; color: var(--p); font-family: 'Space Mono', monospace; }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .restart-btn {
    padding: 13px 32px;
    background: var(--p);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .restart-btn:hover { opacity: 0.85; }

  /* ── FOOTER ── */
  footer {
    background: var(--p);
    color: rgba(255,255,255,0.65);
    text-align: center;
    padding: 14px 20px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  footer strong { color: white; }
</style>
</head>
<body>

<header>
  <h1>MISSÃO GRAFOS</h1>
  <p>7º Ano — Teoria dos Grafos</p>
</header>

<main>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="pf" style="width:0%"></div></div>
    <div class="progress-label" id="pl">0 / 10</div>
  </div>
  <div id="main-area" style="width:100%;max-width:680px;"></div>
</main>

<footer>
  Desenvolvido por <strong>Profª Adriana Bett Terebinto</strong> &nbsp;·&nbsp; 7º Ano &nbsp;·&nbsp; Matemática
</footer>

<script>
const LETRAS = ['A','B','C','D'];

const fases = [
  {
    t: "Desafio 1 — Conceito básico",
    p: "Um <strong>grafo</strong> serve para representar como as coisas se conectam entre si. Quais são os dois elementos que formam todo grafo?",
    visual: `<svg viewBox="0 0 300 95" xmlns="http://www.w3.org/2000/svg" width="100%" height="85">
      <line x1="60" y1="48" x2="150" y2="48" stroke="#4361ee" stroke-width="2.5"/>
      <line x1="150" y1="48" x2="240" y2="48" stroke="#4361ee" stroke-width="2.5"/>
      <circle cx="60" cy="48" r="18" fill="#e8eeff" stroke="#4361ee" stroke-width="2"/>
      <circle cx="150" cy="48" r="18" fill="#e8eeff" stroke="#4361ee" stroke-width="2"/>
      <circle cx="240" cy="48" r="18" fill="#e8eeff" stroke="#4361ee" stroke-width="2"/>
      <text x="60" y="53" text-anchor="middle" font-size="11" font-weight="700" fill="#4361ee" font-family="Nunito,sans-serif">A</text>
      <text x="150" y="53" text-anchor="middle" font-size="11" font-weight="700" fill="#4361ee" font-family="Nunito,sans-serif">B</text>
      <text x="240" y="53" text-anchor="middle" font-size="11" font-weight="700" fill="#4361ee" font-family="Nunito,sans-serif">C</text>
      <text x="105" y="39" text-anchor="middle" font-size="9" fill="#4361ee" font-family="Nunito,sans-serif">aresta</text>
      <text x="195" y="39" text-anchor="middle" font-size="9" fill="#4361ee" font-family="Nunito,sans-serif">aresta</text>
      <text x="60" y="78" text-anchor="middle" font-size="9" fill="#6b7280" font-family="Nunito,sans-serif">vértice</text>
      <text x="150" y="78" text-anchor="middle" font-size="9" fill="#6b7280" font-family="Nunito,sans-serif">vértice</text>
      <text x="240" y="78" text-anchor="middle" font-size="9" fill="#6b7280" font-family="Nunito,sans-serif">vértice</text>
    </svg>`,
    o: ["Bolinhas e quadrados","Vértices e arestas","Pontos e setas","Linhas e ângulos"],
    c: 1,
    exp_certo: "Exato! Todo grafo é formado por <strong>vértices</strong> (os pontos, representando elementos) e <strong>arestas</strong> (as linhas, representando as conexões entre eles).",
    exp_errado: "Observe a figura acima. As bolinhas se chamam <strong>vértices</strong> e as linhas que as ligam se chamam <strong>arestas</strong>.",
    conceito: "<strong>Vértice</strong> = um ponto do grafo (pessoa, cidade, site…). <strong>Aresta</strong> = a ligação entre dois vértices."
  },
  {
    t: "Desafio 2 — Contando arestas",
    p: "Observe o grafo abaixo. Quantas <strong>arestas</strong> existem na sequência CASA — ESCOLA — CLUBE?",
    visual: `<svg viewBox="0 0 340 85" xmlns="http://www.w3.org/2000/svg" width="100%" height="78">
      <line x1="50" y1="42" x2="160" y2="42" stroke="#4361ee" stroke-width="2.5"/>
      <line x1="180" y1="42" x2="295" y2="42" stroke="#4361ee" stroke-width="2.5"/>
      <rect x="10" y="22" width="80" height="40" rx="8" fill="#eafaf1" stroke="#2ecc71" stroke-width="2"/>
      <rect x="120" y="22" width="100" height="40" rx="8" fill="#eafaf1" stroke="#2ecc71" stroke-width="2"/>
      <rect x="255" y="22" width="75" height="40" rx="8" fill="#eafaf1" stroke="#2ecc71" stroke-width="2"/>
      <text x="50" y="47" text-anchor="middle" font-size="12" font-weight="700" fill="#1a7a45" font-family="Nunito,sans-serif">CASA</text>
      <text x="170" y="47" text-anchor="middle" font-size="12" font-weight="700" fill="#1a7a45" font-family="Nunito,sans-serif">ESCOLA</text>
      <text x="292" y="47" text-anchor="middle" font-size="12" font-weight="700" fill="#1a7a45" font-family="Nunito,sans-serif">CLUBE</text>
    </svg>`,
    o: ["1 aresta","2 arestas","3 arestas","4 arestas"],
    c: 1,
    exp_certo: "Correto! Existem <strong>2 arestas</strong>: uma entre CASA e ESCOLA, e outra entre ESCOLA e CLUBE. Há 3 vértices, mas apenas 2 conexões.",
    exp_errado: "Conte as <strong>linhas de conexão</strong>, não os vértices. CASA–ESCOLA = 1 aresta. ESCOLA–CLUBE = 1 aresta. Total = 2 arestas.",
    conceito: "Com <em>n</em> vértices em sequência, o número de arestas é sempre <em>n − 1</em>. Aqui: 3 vértices − 1 = 2 arestas."
  },
  {
    t: "Desafio 3 — Grau do vértice",
    p: "O <strong>grau</strong> de um vértice é a quantidade de arestas que chegam nele. No grafo abaixo, qual é o grau do vértice central X?",
    visual: `<svg viewBox="0 0 220 160" xmlns="http://www.w3.org/2000/svg" width="100%" height="145">
      <line x1="110" y1="80" x2="40" y2="28" stroke="#4361ee" stroke-width="2"/>
      <line x1="110" y1="80" x2="180" y2="28" stroke="#4361ee" stroke-width="2"/>
      <line x1="110" y1="80" x2="28" y2="110" stroke="#4361ee" stroke-width="2"/>
      <line x1="110" y1="80" x2="192" y2="110" stroke="#4361ee" stroke-width="2"/>
      <line x1="110" y1="80" x2="110" y2="148" stroke="#4361ee" stroke-width="2"/>
      <circle cx="110" cy="80" r="22" fill="#fff0f0" stroke="#e74c3c" stroke-width="2.5"/>
      <circle cx="40" cy="28" r="13" fill="#e8eeff" stroke="#4361ee" stroke-width="2"/>
      <circle cx="180" cy="28" r="13" fill="#e8eeff" stroke="#4361ee" stroke-width="2"/>
      <circle cx="28" cy="110" r="13" fill="#e8eeff" stroke="#4361ee" stroke-width="2"/>
      <circle cx="192" cy="110" r="13" fill="#e8eeff" stroke="#4361ee" stroke-width="2"/>
      <circle cx="110" cy="148" r="13" fill="#e8eeff" stroke="#4361ee" stroke-width="2"/>
      <text x="110" y="86" text-anchor="middle" font-size="14" font-weight="800" fill="#e74c3c" font-family="Nunito,sans-serif">X</text>
      <text x="40" y="33" text-anchor="middle" font-size="10" fill="#4361ee" font-family="Nunito,sans-serif">A</text>
      <text x="180" y="33" text-anchor="middle" font-size="10" fill="#4361ee" font-family="Nunito,sans-serif">B</text>
      <text x="28" y="115" text-anchor="middle" font-size="10" fill="#4361ee" font-family="Nunito,sans-serif">C</text>
      <text x="192" y="115" text-anchor="middle" font-size="10" fill="#4361ee" font-family="Nunito,sans-serif">D</text>
      <text x="110" y="153" text-anchor="middle" font-size="10" fill="#4361ee" font-family="Nunito,sans-serif">E</text>
    </svg>`,
    o: ["Grau 3","Grau 4","Grau 5","Grau 10"],
    c: 2,
    exp_certo: "Perfeito! O vértice X tem <strong>grau 5</strong> porque 5 arestas partem dele (ligando a A, B, C, D e E).",
    exp_errado: "Conte as linhas que <em>saem</em> de X: X–A, X–B, X–C, X–D, X–E. São 5 arestas → <strong>grau 5</strong>.",
    conceito: "<strong>Grau</strong> de um vértice = número de arestas incidentes. Vértice com grau alto = 'hub', muito conectado na rede."
  },
  {
    t: "Desafio 4 — Grafos dirigidos",
    p: "No Instagram, você <em>segue</em> alguém (ela pode não te seguir). No WhatsApp, a conversa é <em>mútua</em>. Qual tipo de grafo representa o Instagram?",
    visual: `<svg viewBox="0 0 340 108" xmlns="http://www.w3.org/2000/svg" width="100%" height="100">
      <defs>
        <marker id="a1" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5 z" fill="#e74c3c"/></marker>
        <marker id="a2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5 z" fill="#2ecc71"/></marker>
        <marker id="a3" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5 z" fill="#2ecc71"/></marker>
      </defs>
      <text x="80" y="14" text-anchor="middle" font-size="12" font-weight="700" fill="#e74c3c" font-family="Nunito,sans-serif">Instagram</text>
      <circle cx="35" cy="54" r="19" fill="#fff0f0" stroke="#e74c3c" stroke-width="2"/>
      <circle cx="125" cy="54" r="19" fill="#fff0f0" stroke="#e74c3c" stroke-width="2"/>
      <line x1="55" y1="54" x2="100" y2="54" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#a1)"/>
      <text x="35" y="59" text-anchor="middle" font-size="11" font-weight="700" fill="#e74c3c" font-family="Nunito,sans-serif">EU</text>
      <text x="125" y="59" text-anchor="middle" font-size="10" font-weight="700" fill="#e74c3c" font-family="Nunito,sans-serif">FAMOSO</text>
      <text x="80" y="90" text-anchor="middle" font-size="10" fill="#6b7280" font-family="Nunito,sans-serif">seta única → grafo dirigido</text>

      <text x="255" y="14" text-anchor="middle" font-size="12" font-weight="700" fill="#1a7a45" font-family="Nunito,sans-serif">WhatsApp</text>
      <circle cx="210" cy="54" r="19" fill="#eafaf1" stroke="#2ecc71" stroke-width="2"/>
      <circle cx="300" cy="54" r="19" fill="#eafaf1" stroke="#2ecc71" stroke-width="2"/>
      <line x1="230" y1="48" x2="278" y2="48" stroke="#2ecc71" stroke-width="2.5" marker-end="url(#a2)"/>
      <line x1="280" y1="60" x2="232" y2="60" stroke="#2ecc71" stroke-width="2.5" marker-end="url(#a3)"/>
      <text x="210" y="59" text-anchor="middle" font-size="10" font-weight="700" fill="#1a7a45" font-family="Nunito,sans-serif">EU</text>
      <text x="300" y="59" text-anchor="middle" font-size="10" font-weight="700" fill="#1a7a45" font-family="Nunito,sans-serif">AMIGO</text>
      <text x="255" y="90" text-anchor="middle" font-size="10" fill="#6b7280" font-family="Nunito,sans-serif">setas duplas → não-dirigido</text>
    </svg>`,
    o: ["Grafo não-dirigido","Grafo colorido","Grafo dirigido","Grafo isolado"],
    c: 2,
    exp_certo: "Certo! O Instagram usa <strong>grafo dirigido</strong> porque a relação tem sentido: você segue alguém, mas ela pode não te seguir de volta.",
    exp_errado: "Repare na seta única. Quando a conexão tem <em>direção definida</em> (só de um lado), chamamos de <strong>grafo dirigido</strong>.",
    conceito: "<strong>Dirigido</strong>: arestas com seta (direção importa). <strong>Não-dirigido</strong>: linhas simples (relação mútua). Ruas de mão única = grafo dirigido."
  },
  {
    t: "Desafio 5 — Vértice isolado",
    p: "O vértice <strong>Z</strong> não tem nenhuma aresta conectada. Como chamamos esse tipo de vértice?",
    visual: `<svg viewBox="0 0 300 118" xmlns="http://www.w3.org/2000/svg" width="100%" height="110">
      <line x1="60" y1="58" x2="140" y2="58" stroke="#4361ee" stroke-width="2"/>

      <line x1="140" y1="58" x2="198" y2="88" stroke="#4361ee" stroke-width="2"/>
      <circle cx="60" cy="58" r="16" fill="#e8eeff" stroke="#4361ee" stroke-width="2"/>
      <circle cx="140" cy="58" r="16" fill="#e8eeff" stroke="#4361ee" stroke-width="2"/>
      <circle cx="205" cy="28" r="16" fill="#e8eeff" stroke="#4361ee" stroke-width="2"/>
      <circle cx="205" cy="88" r="16" fill="#e8eeff" stroke="#4361ee" stroke-width="2"/>
      <circle cx="272" cy="58" r="17" fill="#fff8e1" stroke="#f39c12" stroke-width="2.5" stroke-dasharray="6,3"/>
      <text x="60" y="63" text-anchor="middle" font-size="11" font-weight="700" fill="#4361ee" font-family="Nunito,sans-serif">A</text>
      <text x="140" y="63" text-anchor="middle" font-size="11" font-weight="700" fill="#4361ee" font-family="Nunito,sans-serif">B</text>
      <text x="205" y="33" text-anchor="middle" font-size="11" font-weight="700" fill="#4361ee" font-family="Nunito,sans-serif">C</text>
      <text x="205" y="93" text-anchor="middle" font-size="11" font-weight="700" fill="#4361ee" font-family="Nunito,sans-serif">D</text>
      <text x="272" y="63" text-anchor="middle" font-size="14" font-weight="800" fill="#f39c12" font-family="Nunito,sans-serif">Z</text>
      <text x="272" y="88" text-anchor="middle" font-size="9" fill="#f39c12" font-family="Nunito,sans-serif">sem ligações!</text>
    </svg>`,
    o: ["Vértice popular","Vértice invisível","Vértice mestre","Vértice isolado"],
    c: 3,
    exp_certo: "Isso mesmo! <strong>Vértice isolado</strong> é aquele com grau 0 — nenhuma aresta conectada a ele.",
    exp_errado: "Repare que Z não tem nenhuma linha saindo. Um vértice sem arestas tem <strong>grau 0</strong> e se chama <strong>vértice isolado</strong>.",
    conceito: "<strong>Vértice isolado</strong> = grau 0. Em redes sociais, seria uma pessoa sem nenhum amigo ou seguidor."
  },
  {
    t: "Desafio 6 — GPS e caminho mínimo",
    p: "O GPS calcula o trajeto mais rápido entre dois pontos. Em grafos, como chamamos esse trajeto que minimiza a distância total?",

let fase = 0, erros = 0;

function render() {
  const pct = Math.round((fase / fases.length) * 100);
  document.getElementById('pf').style.width = pct + '%';
  document.getElementById('pl').textContent = fase + ' / ' + fases.length;
  if (fase >= fases.length) { renderFim(); return; }
  const f = fases[fase];
  document.getElementById('main-area').innerHTML = `
    <div class="card">
      <span class="phase-badge">Desafio ${fase + 1} de ${fases.length}</span>
      <div class="question">${f.p}</div>
      ${f.visual ? `<div class="visual">${f.visual}</div>` : ''}
      <div class="options" id="opts">
        ${f.o.map((op,i) => `
          <button class="opt" id="opt-${i}" onclick="verificar(${i})">
            <span class="opt-letter">${LETRAS[i]}</span>
            <span>${op}</span>
          </button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div>
      <button class="next-btn" id="nb" onclick="avancar()">
        ${fase === fases.length-1 ? 'Ver resultado final →' : 'Próximo desafio →'}
      </button>
    </div>`;
}

function verificar(idx) {
  const f = fases[fase];
  document.querySelectorAll('.opt').forEach(o => o.disabled = true);
  const fb = document.getElementById('fb');
  if (idx === f.c) {
    document.getElementById('opt-'+idx).classList.add('correct');
    fb.className = 'feedback ok show';
    fb.innerHTML = `<div class="fb-title">Correto!</div>${f.exp_certo}<div class="concept-box"><strong>Conceito-chave:</strong> ${f.conceito}</div>`;
  } else {
    document.getElementById('opt-'+idx).classList.add('wrong');
    document.getElementById('opt-'+f.c).classList.add('correct');
    erros++;
    fb.className = 'feedback bad show';
    fb.innerHTML = `<div class="fb-title">Quase! A resposta certa era "${f.o[f.c]}"</div>${f.exp_errado}<div class="concept-box"><strong>Conceito-chave:</strong> ${f.conceito}</div>`;
  }
  document.getElementById('nb').classList.add('show');
}

function avancar() {
  fase++;
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderFim() {
  const acertos = fases.length - erros;
  const pct = Math.round((acertos / fases.length) * 100);
  let msg, icon;
  if (pct === 100) { msg = "Incrível! Acerto total — você domina grafos!"; icon = "★"; }
  else if (pct >= 70) { msg = "Muito bem! Você entende como o mundo se conecta."; icon = "✓"; }
  else { msg = "Bom esforço! Revise o material e tente de novo."; icon = "↺"; }
  document.getElementById('pf').style.width = '100%';
  document.getElementById('pl').textContent = '10 / 10';
  document.getElementById('main-area').innerHTML = `
    <div class="card end-card">
      <span class="end-icon">${icon}</span>
      <div class="end-title">Missão Cumprida!</div>
      <div class="end-text">${msg}<br><br>Agora você sabe como o GPS, o Instagram e a própria Internet funcionam por trás das telas — tudo são grafos!</div>
      <div class="stats-row">
        <div class="stat"><div class="stat-val">${acertos}/10</div><div class="stat-label">acertos</div></div>
        <div class="stat"><div class="stat-val">${pct}%</div><div class="stat-label">aproveitamento</div></div>
      </div>
      <button class="restart-btn" onclick="reiniciar()">Recomeçar missão</button>
    </div>`;
}

function reiniciar() { fase = 0; erros = 0; render(); window.scrollTo({top:0}); }

render();
</script>
